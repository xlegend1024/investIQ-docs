title: InvestIQ Series
description: >-
  Building an Algorithmic Trading System as an Investing Novice, with an AI Team —
  a 5-part technical series (English / 한국어).
url: "https://xlegend1024.github.io"
baseurl: "/investIQ-docs"

# Gem-based theme (stable on GitHub Actions; required for mermaid runtime)
theme: just-the-docs

# Custom fintech color scheme (defined in _sass/color_schemes/investiq.scss)
color_scheme: investiq

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 3
  preview_words_after: 3
  rel_url: true
  button: false

# Render ```mermaid code blocks as diagrams
mermaid:
  version: "10.9.1"

# Callouts for richer content blocks
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: red
  highlight:
    color: yellow
  scope:
    title: Scope & limits
    color: purple

# Header / footer links to the repository
aux_links:
  "GitHub":
    - "https://github.com/xlegend1024/investIQ-docs"
aux_links_new_tab: true

# Copy button on code blocks
enable_copy_code_button: true

# Footer
footer_content: >-
  © 2026 InvestIQ Series. Paper-account results, single window — analyzed honestly.
back_to_top: true
back_to_top_text: "Back to top"

# Files that should not be bundled into the published site
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .github
  - .gitignore

plugins:
  - jekyll-relative-links
  - jekyll-seo-tag

# Make relative .md links resolve to the generated pages
relative_links:
  enabled: true
  collections: false
